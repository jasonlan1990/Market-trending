name: Update market data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update JSON data
        env:
          NEWS_RSS_URLS: ${{ vars.NEWS_RSS_URLS }}
          MARKET_TURNOVER_TEXT: ${{ vars.MARKET_TURNOVER_TEXT }}
          MARKET_UP_COUNT: ${{ vars.MARKET_UP_COUNT }}
          MARKET_DOWN_COUNT: ${{ vars.MARKET_DOWN_COUNT }}
          MARKET_LIMIT_UP_COUNT: ${{ vars.MARKET_LIMIT_UP_COUNT }}
        run: python scripts/update_data.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json data/news.json
          git diff --cached --quiet && exit 0
          git commit -m "Update market data"
          git push
